<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">

<title>MTG - Collection tracker</title>

<link rel="stylesheet"
href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">

<link rel="stylesheet" href="{{ASSET_CSS}}">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

</head>

<body data-current-set="{{CURRENT_SET}}" class="collection-report">

<h1>MTG - Collection tracker</h1>

<div class="report-layout">
    <aside class="side-nav">
        {{SIDE_NAV}}
    </aside>

    <main class="report-content">
        <div class="report-toolbar">
            {{SET_SELECTOR}}
        </div>
        <div class="export-toolbar">
            <button type="button" class="export-button" id="export-cards-csv">Export cards (CSV)</button>
            <button type="button" class="export-button" id="export-summary-csv">Export summary (CSV)</button>
        </div>

        <div class="tables-row">
            <div class="table-panel summary-panel">
                <table id="summaryTable" class="display">
                    <thead>
                        <tr>
                            <th>Set</th>
                            <th>Art Style</th>
                            <th>Cards</th>
                            <th>Current Value</th>
                            <th>Change</th>
                            <th>Profit / Loss</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

            <div class="table-panel cards-panel">
                <table id="cardsTable" class="display">
                    <thead>
                        <tr>
                            <th>Set</th>
                            <th>Art Style</th>
                            <th>Card</th>
                            <th>Current Value</th>
                            <th>Change</th>
                            <th>Profit / Loss</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

{{REPORT_FOOTER}}

<script src="{{DATA_JS}}"></script>
<script src="{{ASSET_TOOLTIP_JS}}"></script>
<script src="{{ASSET_FORMAT_JS}}"></script>
<script src="{{PAGE_JS}}"></script>

</body>
</html>
