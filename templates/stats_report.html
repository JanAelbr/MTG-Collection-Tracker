<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">

<title>MTG - Collection tracker</title>

<link rel="stylesheet" href="{{ASSET_CSS}}">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

</head>

<body data-current-set="{{CURRENT_SET}}" class="stats-report">

<h1>MTG - Collection tracker</h1>

<div class="report-layout">
    <aside class="side-nav">
        {{SIDE_NAV}}
    </aside>

    <main class="report-content">
        <div class="report-toolbar">
            {{SET_SELECTOR}}
        </div>
        <div class="export-toolbar">
            <button type="button" class="export-button" id="export-unknown-csv">Export unknown value (CSV)</button>
        </div>

        <div class="stats-dashboard">
            <div class="stats-hero-row">
                <div class="card art-style-card">
                    <h3>Value by art style</h3>
                    <div class="stats-table-wrap">
                        <table id="artStyleTable" class="stats-table">
                            <thead>
                                <tr id="artStyleTableHead">
                                    <th>Art style</th>
                                    <th>Cards</th>
                                    <th>Value</th>
                                    <th>Profit / Loss</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="card current-card">
                <h3>Current value</h3>
                <div class="card-value" data-stat="current"></div>
            </div>

            <div class="card invested-card">
                <h3>Invested</h3>
                <div class="card-value" data-stat="invested"></div>
            </div>

            <div class="card profit-card">
                <h3>Profit / Loss</h3>
                <div class="card-value" data-stat="profit"></div>
            </div>

            <div class="card roi-card">
                <h3>Return</h3>
                <div class="card-value" data-stat="roi"></div>
            </div>

            <div class="card owned-card">
                <h3>Cards owned</h3>
                <div class="card-value" data-stat="owned"></div>
            </div>

            <div class="card completion-card">
                <h3>Collection progress</h3>
                <div class="card-value" data-stat="completion"></div>
            </div>

            <div class="card average-card">
                <h3>Average value</h3>
                <div class="card-value" data-stat="average"></div>
            </div>

            <div class="card unknown-card">
                <h3>Unknown value</h3>
                <div class="card-value" data-stat="unknown"></div>
                <div class="card-subtext" data-stat="unknown-count"></div>
            </div>

            <div class="card winners-card">
                <h3>Winners</h3>
                <div class="card-value" data-stat="winners"></div>
                <div class="card-subtext">Cards with profit</div>
            </div>

            <div class="card losers-card">
                <h3>Losers</h3>
                <div class="card-value" data-stat="losers"></div>
                <div class="card-subtext">Cards with loss</div>
            </div>
        </div>
    </main>
</div>

{{REPORT_FOOTER}}

<script src="{{DATA_JS}}"></script>
<script src="{{ASSET_FORMAT_JS}}"></script>
<script src="{{PAGE_JS}}"></script>

</body>
</html>
