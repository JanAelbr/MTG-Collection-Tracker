<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">

<title>MTG - Collection tracker</title>

<link rel="stylesheet"
href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">

<link rel="stylesheet" href="{{ASSET_CSS}}">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

</head>

<body class="manager-report">

<h1>MTG - Collection tracker</h1>

<div class="report-layout">
    <aside class="side-nav">
        {{SIDE_NAV}}
    </aside>

    <main class="report-content">
        <div class="report-toolbar">
            {{SET_SELECTOR}}
            <button type="button" class="export-button" id="export-manager-csv">Export purchases (CSV)</button>
        </div>
        <p class="manager-help">Check the finishes you own, then export the CSV and save it as <code>data/{set}.csv</code> before running <code>python scripts/purchase_import.py</code>.</p>

        <div class="tables-row manager-table-row">
            <div class="table-panel cards-panel manager-cards-panel">
                <table id="managerTable" class="display manager-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Card</th>
                            <th>Art Style</th>
                            <th>Non-foil</th>
                            <th>Foil</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

{{REPORT_FOOTER}}

<script src="{{DATA_JS}}"></script>
<script src="{{ASSET_TOOLTIP_JS}}"></script>
<script src="{{ASSET_FORMAT_JS}}"></script>
<script src="{{PAGE_JS}}"></script>

</body>
</html>
