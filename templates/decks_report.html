<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">

<title>MTG - Collection tracker</title>

<link rel="stylesheet"
href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">

<link rel="stylesheet" href="{{ASSET_CSS}}">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

</head>

<body data-current-deck="" class="decks-report">

<h1>MTG - Collection tracker</h1>

<div class="report-layout">
    <aside class="side-nav">
        {{SIDE_NAV}}
    </aside>

    <main class="report-content">
        <div class="report-toolbar report-toolbar-deck-browse">
            {{DECK_TOOLBAR}}
        </div>

        <div class="deck-gallery-wrap">
            <div class="deck-gallery-toolbar">
                <span class="report-set-label">Sort gallery</span>
                <div class="button-group deck-gallery-sort-group">
                    <input type="radio" name="deck-gallery-sort" id="deck-gallery-sort-year"
                        value="year" class="deck-gallery-sort-input" checked>
                    <label for="deck-gallery-sort-year" class="filter-button">Year</label>
                    <input type="radio" name="deck-gallery-sort" id="deck-gallery-sort-value"
                        value="value" class="deck-gallery-sort-input">
                    <label for="deck-gallery-sort-value" class="filter-button">Value</label>
                </div>
            </div>
            <div id="deck-gallery" class="deck-gallery" aria-label="All decks"></div>
        </div>

        <section id="deck-hero" class="deck-hero">
            <div class="deck-hero-header">
                <h2 id="deck-hero-title" class="deck-hero-deck-name"></h2>
                <p id="deck-hero-value" class="deck-hero-deck-value"></p>
            </div>
            <div class="deck-hero-panels">
                <div class="deck-hero-panel deck-hero-commanders">
                    <h3 class="deck-hero-panel-title">Commander</h3>
                    <div class="deck-hero-images"></div>
                </div>
                <div class="deck-hero-panel deck-hero-top">
                    <h3 class="deck-hero-panel-title">Most valuable</h3>
                    <div class="deck-hero-images top-card-images"></div>
                </div>
            </div>
        </section>

        <div class="deck-summary" id="deck-summary">
            <div class="deck-summary-item deck-summary-item-value">
                <span class="deck-summary-label">Owned / deck value</span>
                <span class="deck-summary-value" data-stat="value-range"></span>
            </div>
            <div class="deck-summary-item">
                <span class="deck-summary-label">Cards owned</span>
                <span class="deck-summary-value" data-stat="owned"></span>
            </div>
            <div class="deck-summary-item">
                <span class="deck-summary-label">Cards</span>
                <span class="deck-summary-value" data-stat="deck-size"></span>
            </div>
            <div class="deck-summary-item">
                <span class="deck-summary-label">Missing</span>
                <span class="deck-summary-value" data-stat="missing"></span>
            </div>
            <div class="deck-summary-item">
                <span class="deck-summary-label">Catalog coverage</span>
                <span class="deck-summary-value" data-stat="tracked"></span>
            </div>
        </div>

        <div class="tables-row decks-table-row">
            <div class="table-panel cards-panel decks-cards-panel">
                <table id="decksTable" class="display decks-table">
                    <thead>
                        <tr>
                            <th>Section</th>
                            <th>Qty</th>
                            <th>Card</th>
                            <th>Set</th>
                            <th>Finish</th>
                            <th>Art</th>
                            <th>Unit</th>
                            <th>Total</th>
                            <th>Owned</th>
                            <th>Gain / Loss</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

{{REPORT_FOOTER}}

<script src="{{DATA_JS}}"></script>
<script src="{{ASSET_TOOLTIP_JS}}"></script>
<script src="{{ASSET_FORMAT_JS}}"></script>
<script src="{{PAGE_JS}}"></script>

</body>
</html>
